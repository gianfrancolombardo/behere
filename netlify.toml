# Behere — Netlify deployment
# Docs: https://docs.netlify.com/configure-builds/file-based-configuration/
#
# Deploy from the Netlify UI:
#   1. Add new site → Import from Git → select this repository
#   2. Netlify reads this file automatically (no manual build settings needed)
#   3. Deploy
#
# Deploy from the CLI:
#   npm install -g netlify-cli
#   netlify login
#   netlify init          # link site on first run
#   netlify deploy        # draft URL
#   netlify deploy --prod # production

[build]
  base = "web"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  # Set in Netlify UI (Site settings → Environment variables):
  # PUBLIC_WEB3FORMS_ACCESS_KEY
  # PUBLIC_UMAMI_WEBSITE_ID=18ee3c65-c408-45b3-8203-190d545762ee
